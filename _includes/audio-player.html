<!-- Audio Player -->
{% assign audio = site.data.site.audio %}
<div class="audio-player" id="audioPlayer">
  <button class="player-btn" id="playerBtn" aria-label="播放/暂停" title="播放/暂停">▶</button>
  <div class="player-info">
    <span class="player-title">{{ audio.title }}</span>
    <span class="player-artist">{{ audio.artist }}</span>
  </div>
  <div class="player-wave" id="playerWave">
    <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
  </div>
  <div class="player-volume">
    <span style="font-size:0.7rem;color:var(--muted);">🔊</span>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5" aria-label="音量">
  </div>
</div>

<audio id="bgAudio" loop preload="auto" style="display:none;">
  <source src="{{ audio.file | relative_url }}" type="audio/mpeg">
</audio>
