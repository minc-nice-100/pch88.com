# Timeline data for 时代回响 page
- year: 1994
  title: 中国全功能接入互联网
  desc: 中关村教育与科研示范网络（NCFC）通过美国 Sprint 公司接入 64K 国际专线。中国正式进入互联网时代。此时，中国网民不到 1 万人。
  highlight: false

- year: 1998
  title: 门户时代开启
  desc: 新浪、搜狐、网易相继成立。腾讯推出 OICQ（后改名 QQ）。中国网民突破 100 万。在广东江门，一群大学生正在酝酿一个属于年轻人的网站。
  highlight: false

- year: 1999–2000
  title: "★ 蓬城交友中心成立"
  desc: 五邑大学蓬城俱乐部的大学生们，用 ASP 搭建了这个交友社区。联系地址：广东省江门五邑大学蓬城俱乐部 AP99081 信箱。创始人：伍柳昌、吴锋成、苏华胜、廖海涛。这是中国最早的校园 SNS 之一。
  highlight: true

- year: 2000–2001
  title: 蓬城的黄金时代
  desc: 会员突破 4000 人。网站拥有社区、聊天室、留言簿、娱乐新闻、交友匹配等完整功能。在那个"网友"还是个新鲜词的年代，蓬城让江门的大学生第一次体验到了线上社交的魅力。此时，中国网民约 2250 万。
  highlight: true

- year: 2004–2005
  title: 蓬城下线
  desc: 随着 QQ、校内网（人人网）等大型平台的崛起，像蓬城这样的个人网站逐渐被边缘化。蓬城交友中心悄然下线，域名后来易主。此时，中国网民已突破 1 亿。
  highlight: false

- year: 2005–2008
  title: Web 2.0 浪潮
  desc: 博客兴起，校内网（人人网）上线，中国 SNS 进入新纪元。豆瓣、土豆网、优酷相继诞生。中国网民突破 2 亿。
  highlight: false

- year: 2011–2015
  title: 移动互联网革命
  desc: 微信诞生，移动支付普及，O2O 大战。中国网民突破 6 亿，其中手机网民占 90%。Web 1.0 时代的个人网站几乎全部消失。
  highlight: false

- year: 2019
  title: 域名出售
  desc: pch88.com 域名在易名中国挂牌出售，标价 ¥5,000。一个时代的句号。从 1999 到 2019，正好 20 年。这 20 年，中国互联网从 400 万网民增长到 8.5 亿。
  highlight: false

- year: 2026
  title: "★ 域名回归"
  desc: 创始人的儿子重新注册了 pch88.com 和 鹏城.com。透过 Internet Archive 的 Wayback Machine，26 年前的网站重现于世。一代人搭建，一代人寻回——这是属于中国互联网的浪漫。
  highlight: true
