# About features
features:
  - icon: 💬
    title: 蓬城社区
    desc: BBS 论坛时代的缩影。在没有朋友圈的年代，这里是年轻人分享生活、交流思想的数字广场。
  - icon: 💕
    title: 网际寻友
    desc: 按性别、年龄、职业筛选好友。在 QQ 号还只有 6 位数的年代，这是最潮的社交方式。
  - icon: 📷
    title: 相片上传
    desc: 在 56K 猫的时代，上传一张照片需要勇气和耐心。每一张模糊的 JPEG 都是珍贵的数字记忆。
  - icon: 💬
    title: 聊天室
    desc: 基于 ASP 的实时聊天室。没有表情包，没有语音，只有文字——但足以让五邑大学的夜晚不再寂寞。
  - icon: 📝
    title: 留言簿
    desc: Guestbook——Web 1.0 时代的标志性功能。每一条留言都是公开的，每一个签名都带着那个年代特有的真诚。
  - icon: 🎬
    title: 娱乐星闻
    desc: 刘德华、梁朝伟、周润发争影帝；谢霆锋拍可口可乐广告——2001 年的娱乐圈，通过这个小小的页面传到了江门大学生的屏幕前。

